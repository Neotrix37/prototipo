[build]
builder = "nixpacks"

[deploy]
startCommand = "bash start.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[build.environment]
NODE_VERSION = "18.x"
PYTHON_VERSION = "3.11"

[[services]]
name = "web"
port = 8000

[services.healthcheck]
timeout = 60
interval = 60
start_period = 30
retries = 3
path = "/health"
method = "GET"
