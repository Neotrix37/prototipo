[phases.setup]
nixPkgs = [
    'gcc',
    'python311',
    'python311Packages.pip',
    'python311Packages.virtualenv',
    'postgresql',
    'postgresql.lib',
    'postgresql.dev',
    'python3-dev'
]

[phases.install]
cmds = [
    "python -m ensurepip --upgrade",
    "python -m pip install --upgrade pip",
    "pip install -r requirements.txt"
]

[phases.build]
cmds = [
    "python -m pip install --upgrade pip",
    "pip install -r requirements.txt"
]

[build.args]
PYTHON_VERSION = "3.11"
NODE_VERSION = "18.x"

[build.environment]
PYTHONUNBUFFERED = "1"
PYTHONHASHSEED = "random"
PYTHONPATH = "."
ENVIRONMENT = "production"

[start]
cmd = "bash start.sh"
